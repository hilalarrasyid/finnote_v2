name: Mirror Repository

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Show Git Version
        run: |
          git --version

      - name: Check Secret
        env:
          TOKEN: ${{ secrets.GH_ADITYA_TOKEN }}
        run: |
          echo "Token length: ${#TOKEN}"
          if [ -z "$TOKEN" ]; then
            echo "ERROR: GH_ADITYA_TOKEN is empty"
            exit 1
          fi

      - name: Configure Remote
        env:
          TOKEN: ${{ secrets.GH_ADITYA_TOKEN }}
        run: |
          git remote remove mirror || true
          git remote add mirror https://x-access-token:${TOKEN}@github.com/aditya-project26/finnote.git
          git remote -v

      - name: Push All Branches
        run: |
          git push mirror --all

      - name: Push All Tags
        run: |
          git push mirror --tags
