name: Mirror Repository

on:
  push:
    branches:
      - main

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to GitHub aditya-project26
        run: |
          git remote add mirror https://x-access-token:${{ secrets.GH_ADITYA_TOKEN }}@github.com/aditya-project26/finnote.git
          git push --mirror mirror
